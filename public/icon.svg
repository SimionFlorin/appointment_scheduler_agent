<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="icon-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#002244" flood-opacity="0.08"/>
    </filter>

    <filter id="brain-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="spark-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="30%" stop-color="#8BB9F9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2672CB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="#F4F6F9" />

  <rect x="60" y="60" width="280" height="280" rx="60" fill="#FFFFFF" filter="url(#icon-shadow)" />

  <g id="notepad">
